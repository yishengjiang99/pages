<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Fugue Generator</title>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9D%84%9E%3C/text%3E%3C/svg%3E" />
  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
  <style>
    :root {
      --bg: #f4efe2;
      --panel: #fffaf0;
      --ink: #222;
      --accent: #6a4c2e;
      --muted: #866;
    }

    body {
      margin: 0;
      font-family: ui-serif, Georgia, serif;
      background: var(--bg);
      color: var(--ink);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    h1 {
      margin: 6px 0 10px;
      font-size: 28px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 8px;
      background: var(--panel);
      padding: 12px;
      border: 1px solid #cbb;
      border-radius: 10px;
    }

    .controls>div {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    select,
    button,
    input,
    textarea {
      font: inherit;
    }

    select,
    input,
    textarea {
      padding: 7px;
      border-radius: 7px;
      border: 1px solid #bda;
      background: white;
    }

    button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #8f765d;
      background: #efe2cc;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: #e6d4b8;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.85;
    }

    button.is-loading::before {
      content: '';
      width: 0.9em;
      height: 0.9em;
      border-radius: 50%;
      border: 2px solid rgba(106, 76, 46, 0.25);
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .meta {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .card {
      background: var(--panel);
      border: 1px solid #cbb;
      border-radius: 10px;
      padding: 10px;
    }

    #roll {
      width: 100%;
      height: 360px;
      display: block;
      background: #fbfaf6;
      border: 1px solid #cbb;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Fugue Generator</h1>
    <div class="controls">
      <div><label>Key</label><select id="keySel"></select></div>
      <div><label>Length</label><select id="lengthSel">
          <option value="short">Short</option>
          <option value="medium" selected>Medium</option>
          <option value="long">Long</option>
        </select></div>
      <div><label>Voices</label><select id="voicesSel">
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select></div>
      <div><label>Character</label><select id="charSel">
          <option>severe ricercar</option>
          <option selected>compact fugue</option>
          <option>lively fughetta</option>
          <option>stretto-driven fugue</option>
          <option>toccata + fugue hybrid</option>
        </select></div>
      <div><label>Complexity</label><select id="complexitySel">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select></div>
      <div><label>Tempo</label><select id="tempoSel">
          <option value="78">78</option>
          <option value="92" selected>92</option>
          <option value="108">108</option>
          <option value="126">126</option>
        </select></div>
    </div>
    <div class="actions">
      <button id="genBtn">Generate</button>
      <button id="startBtn">Start / Resume</button>
      <button id="stopBtn">Stop</button>
      <button id="midiBtn">Export MIDI</button>
      <button id="wavBtn">Export WAV</button>
      <button id="newSeedBtn">New Seed</button>
      <span class="small" id="seedBox"></span>
    </div>
    <canvas id="roll" width="1140" height="360"></canvas>
    <div class="meta">
      <div class="card">
        <div><strong>Structure</strong></div>
        <div id="summary" class="small"></div>
      </div>
      <div class="card">
        <label>Structural analysis</label>
        <textarea id="analysisBox"></textarea>
      </div>
    </div>
  </div>
  <script>
    (() => {
      'use strict';

      // ============================================================
      // config and helpers
      // ============================================================
      const KEYS = ['C', 'G', 'D', 'A', 'E', 'F', 'Bb', 'Eb', 'A minor', 'E minor', 'D minor', 'G minor'];
      const KEY_TO_PC = { C: 0, G: 7, D: 2, A: 9, E: 4, F: 5, Bb: 10, Eb: 3, 'A minor': 9, 'E minor': 4, 'D minor': 2, 'G minor': 7 };
      const MODE_OF = key => key.includes('minor') ? 'minor' : 'major';
      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
      const rnd = (rng, a = 1) => rng() * a;
      const choice = (rng, arr) => arr[Math.floor(rng() * arr.length)];
      const coin = (rng, p = 0.5) => rng() < p;
      const sum = arr => arr.reduce((a, b) => a + b, 0);
      const range = n => Array.from({ length: n }, (_, i) => i);
      function mulberry32(a) { return function () { let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
      function hashString(s) { let h = 1779033703 ^ s.length; for (let i = 0; i < s.length; i++) { h = Math.imul(h ^ s.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19; } return (h >>> 0); }
      function byStart(a, b) { return a.startBeat - b.startBeat || a.voice - b.voice || a.midi - b.midi; }
      function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }
      function midiToName(m) { const names = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B']; return names[(m % 12 + 12) % 12] + (Math.floor(m / 12) - 1); }
      function downloadBlob(blob, filename) { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1500); }

      // ============================================================
      // scale and harmony tools
      // ============================================================
      const SCALES = {
        major: [0, 2, 4, 5, 7, 9, 11],
        minor: [0, 2, 3, 5, 7, 8, 10]
      };
      const DEGREE_QUALITIES = {
        major: ['I', 'ii', 'iii', 'IV', 'V', 'vi', 'vii°'],
        minor: ['i', 'ii°', 'III', 'iv', 'v', 'VI', 'VII']
      };
      function makeKeyContext(key) {
        const tonicPc = KEY_TO_PC[key];
        const mode = MODE_OF(key);
        const scale = SCALES[mode];
        return { key, tonicPc, mode, scale };
      }
      function degreePc(ctx, degree) { return (ctx.tonicPc + ctx.scale[(degree - 1) % 7]) % 12; }
      function scaleMidi(ctx, degree, octave) { return 12 * (octave + 1) + degreePc(ctx, degree); }
      function nearestInScale(ctx, midi) {
        let best = midi, bestd = 999;
        for (let oct = -1; oct <= 9; oct++) for (let deg = 1; deg <= 7; deg++) {
          const m = scaleMidi(ctx, deg, oct);
          const d = Math.abs(m - midi);
          if (d < bestd) { bestd = d; best = m; }
        }
        return best;
      }
      function fitToScale(ctx, midi) { return nearestInScale(ctx, midi); }
      function chordPcsForFunction(ctx, fn) {
        const mapMajor = { T: [1, 3, 5], PD: [2, 4, 6], D: [5, 7, 2], CAD: [5, 1] };
        const mapMinor = { T: [1, 3, 5], PD: [2, 4, 6], D: [5, 7, 2], CAD: [5, 1] };
        const degs = (ctx.mode === 'major' ? mapMajor : mapMinor)[fn] || [1, 3, 5];
        return degs.map(d => degreePc(ctx, d));
      }
      function isConsonantInterval(semi) {
        const x = Math.abs(semi) % 12;
        return [0, 3, 4, 7, 8, 9].includes(x);
      }
      function intervalClass(a, b) { return Math.abs(a - b) % 12; }
      function buildHarmonicPlan(ctx, length, character) {
        const measures = length === 'short' ? 14 : length === 'medium' ? 20 : 28;
        const plan = [];
        for (let i = 0; i < measures; i++) {
          let fn = 'T', region = 'tonic';
          if (i >= 4 && i < 7) fn = 'D';
          if (i === 7) fn = 'CAD';
          if (i >= 8 && i < 11) { fn = ['T', 'PD', 'D'][i % 3]; region = ctx.mode === 'major' ? 'dominant' : 'relative'; }
          if (i >= 11 && i < 14) { fn = ['PD', 'D', 'T'][i % 3]; region = 'sequence'; }
          if (i >= 14 && i < measures - 4) { fn = ['T', 'PD', 'D', 'T'][i % 4]; region = (i % 6 < 3 ? 'medial' : 'modulatory'); }
          if (i >= measures - 4) { fn = i === measures - 1 ? 'CAD' : (i === measures - 2 ? 'D' : 'T'); region = 'closing'; }
          if (character === 'stretto-driven fugue' && i > measures - 6) region = 'stretto';
          if (character === 'toccata + fugue hybrid' && i < 2) region = 'prelude';
          plan.push({ measure: i, fn, region });
        }
        return plan;
      }

      // ============================================================
      // subject generator
      // ============================================================
      function generateSubject(ctx, rng, character, complexity) {
        const rhythmBanks = {
          'severe ricercar': [[1, 1, 1, 1, 1, 1], [2, 1, 1, 2, 2], [1, 0.5, 0.5, 1, 1, 2]],
          'compact fugue': [[1, 0.5, 0.5, 1, 1, 1, 1], [0.5, 0.5, 1, 1, 0.5, 0.5, 2, 1], [1, 1, 0.5, 0.5, 1, 2]],
          'lively fughetta': [[0.5, 0.5, 0.5, 0.5, 1, 1, 1, 1], [1, 0.5, 0.5, 0.5, 0.5, 1, 2], [0.5, 0.5, 1, 0.5, 0.5, 1, 1, 1]],
          'stretto-driven fugue': [[0.5, 0.5, 1, 0.5, 0.5, 1, 1, 1], [1, 0.5, 0.5, 1, 0.5, 0.5, 1, 1], [0.5, 0.5, 0.5, 0.5, 1, 1, 2]],
          'toccata + fugue hybrid': [[0.25, 0.25, 0.5, 0.5, 0.5, 0.5, 1, 1, 1], [0.5, 0.5, 0.5, 0.5, 1, 1, 1, 1], [1, 0.5, 0.5, 0.25, 0.25, 1, 2]],
        };
        const contourBanks = [
          [0, 2, 4, 3, 5, 4, 2, 1],
          [0, 1, 3, 5, 4, 2, 3, 1],
          [0, 4, 3, 1, 2, 5, 4, 2],
          [0, -1, 2, 4, 3, 1, 2, 0],
          [0, 3, 2, 4, 6, 5, 3, 2]
        ];
        const rhythm = choice(rng, rhythmBanks[character]).slice(0);
        while (rhythm.length < 6) rhythm.push(1);
        const contour = choice(rng, contourBanks);
        const len = clamp(Math.round(6 + complexity + rnd(rng, 3)), 6, 12);
        const startDegree = coin(rng, 0.6) ? 1 : choice(rng, [3, 5]);
        const startOct = ctx.mode === 'major' ? 5 : 4;
        const baseMidi = scaleMidi(ctx, startDegree, startOct);
        let last = baseMidi;
        const notes = [];
        let beat = 0;
        for (let i = 0; i < len; i++) {
          const dur = rhythm[i % rhythm.length];
          const target = baseMidi + contour[i % contour.length] + (coin(rng, 0.2) ? choice(rng, [-2, 2]) : 0);
          let midi = fitToScale(ctx, target);
          if (Math.abs(midi - last) > 8) midi = fitToScale(ctx, last + Math.sign(midi - last) * choice(rng, [2, 3, 4, 5]));
          notes.push({ voice: 0, midi, startBeat: beat, durBeat: dur, role: 'subject', section: 'subject' });
          beat += dur;
          last = midi;
        }
        // close near dominant or tonic for answer potential
        const lastN = notes[notes.length - 1];
        lastN.midi = fitToScale(ctx, scaleMidi(ctx, coin(rng, 0.5) ? 5 : 2, Math.floor(lastN.midi / 12) - 1));
        return { notes, totalBeats: beat };
      }

      // ============================================================
      // transformation library
      // ============================================================
      function transformSubject(subjectNotes, opts) {
        const { transpose = 0, invertAround = null, retrograde = false, augment = 1, diminish = 1, tonalAdjust = false, ctx = null } = opts || {};
        let notes = deepCopy(subjectNotes);
        if (invertAround != null) {
          notes = notes.map(n => ({ ...n, midi: invertAround - (n.midi - invertAround) }));
        }
        if (retrograde) {
          const total = notes[notes.length - 1].startBeat + notes[notes.length - 1].durBeat;
          notes = notes.slice().reverse().map(n => ({ ...n, startBeat: total - (n.startBeat + n.durBeat) }));
        }
        const factor = augment / diminish;
        notes = notes.map(n => ({ ...n, startBeat: n.startBeat * factor, durBeat: n.durBeat * factor, midi: n.midi + transpose }));
        if (tonalAdjust && ctx) {
          // Bach principle: tonal answer preserves harmonic function by muting exact real transposition at sensitive scale degrees.
          notes = notes.map((n, i) => {
            let midi = n.midi;
            const pc = (midi % 12 + 12) % 12;
            const tonic = ctx.tonicPc, dom = (ctx.tonicPc + 7) % 12;
            if (i < 3 && pc === ((tonic + 7) % 12)) midi -= 1;
            if (pc === ((dom + 5) % 12)) midi -= 1;
            return { ...n, midi: fitToScale(ctx, midi) };
          });
        } else if (ctx) {
          notes = notes.map(n => ({ ...n, midi: fitToScale(ctx, n.midi) }));
        }
        return notes.sort(byStart);
      }
      function fragmentNotes(notes, from, to) {
        return notes.filter(n => n.startBeat >= from && n.startBeat < to).map(n => ({ ...n, startBeat: n.startBeat - from }));
      }
      function sequenceFragment(ctx, frag, steps, transposition, durScale) {
        const out = [];
        let beat = 0;
        for (let i = 0; i < steps; i++) {
          frag.forEach(n => out.push({
            ...n,
            midi: fitToScale(ctx, n.midi + i * transposition),
            startBeat: beat + n.startBeat * durScale,
            durBeat: n.durBeat * durScale,
            role: 'episode'
          }));
          const fragDur = Math.max(...frag.map(n => n.startBeat + n.durBeat)) * durScale;
          beat += fragDur;
        }
        return out;
      }
      function buildCountersubject(ctx, subject, rng) {
        // Bach principle: countersubject keeps rhythmic identity and invertible tendency while avoiding homophonic lockstep.
        const notes = [];
        for (const s of subject) {
          const dir = coin(rng, 0.5) ? -1 : 1;
          const offset = choice(rng, [3, 4, 6, 8, 9]);
          let midi = fitToScale(ctx, s.midi + dir * offset);
          if (intervalClass(midi, s.midi) === 0) midi = fitToScale(ctx, midi + dir * 2);
          let dur = s.durBeat;
          if (dur >= 1 && coin(rng, 0.6)) {
            notes.push({ voice: 0, midi, startBeat: s.startBeat, durBeat: dur / 2, role: 'countersubject' });
            notes.push({ voice: 0, midi: fitToScale(ctx, midi + dir * 2), startBeat: s.startBeat + dur / 2, durBeat: dur / 2, role: 'countersubject' });
          } else {
            notes.push({ voice: 0, midi, startBeat: s.startBeat, durBeat: dur, role: 'countersubject' });
          }
        }
        return notes.sort(byStart);
      }

      // ============================================================
      // contrapuntal validator
      // ============================================================
      function expandTimeline(notes, step = 0.5) {
        const end = Math.max(...notes.map(n => n.startBeat + n.durBeat), 0);
        const voices = [...new Set(notes.map(n => n.voice))];
        const grid = [];
        for (let t = 0; t < end; t += step) {
          const frame = { t, pitches: {} };
          for (const v of voices) {
            const n = notes.find(x => x.voice === v && x.startBeat <= t + 1e-9 && x.startBeat + x.durBeat > t + 1e-9);
            if (n) frame.pitches[v] = n.midi;
          }
          grid.push(frame);
        }
        return grid;
      }
      function countParallels(notes) {
        const grid = expandTimeline(notes, 0.5);
        let p5 = 0, p8 = 0, contrary = 0, totalMotion = 0, unisons = 0, overlaps = 0;
        for (let i = 1; i < grid.length; i++) {
          const prev = grid[i - 1].pitches, curr = grid[i].pitches;
          const voices = Object.keys(curr).map(Number);
          for (let a = 0; a < voices.length; a++) for (let b = a + 1; b < voices.length; b++) {
            const va = voices[a], vb = voices[b];
            if (prev[va] == null || prev[vb] == null || curr[va] == null || curr[vb] == null) continue;
            const ip = intervalClass(prev[va], prev[vb]), ic = intervalClass(curr[va], curr[vb]);
            const ma = Math.sign(curr[va] - prev[va]), mb = Math.sign(curr[vb] - prev[vb]);
            if (ma !== 0 || mb !== 0) totalMotion++;
            if (ma === -mb && ma !== 0) contrary++;
            if (ic === 0) unisons++;
            if ((ip === 7 || ip === 0) && ic === ip && ma === mb && ma !== 0) { if (ic === 7) p5++; else p8++; }
            if (curr[va] <= curr[vb] && va > vb) overlaps++; // voice crossing proxy
          }
        }
        return { p5, p8, contrary, totalMotion, unisons, overlaps };
      }
      function melodicLeapPenalty(notes) {
        let penalty = 0;
        const byVoice = groupByVoice(notes);
        for (const arr of Object.values(byVoice)) {
          for (let i = 1; i < arr.length; i++) {
            const leap = Math.abs(arr[i].midi - arr[i - 1].midi);
            if (leap > 7) penalty += leap - 7;
            if (i >= 2) {
              const prev = arr[i - 1].midi - arr[i - 2].midi;
              const cur = arr[i].midi - arr[i - 1].midi;
              if (Math.abs(prev) > 5 && Math.sign(prev) === Math.sign(cur) && Math.abs(cur) > 2) penalty += 3;
            }
          }
        }
        return penalty;
      }
      function cadenceStrength(notes, totalBeats, ctx) {
        const tail = notes.filter(n => n.startBeat >= totalBeats - 4);
        const tonic = ctx.tonicPc, dom = (ctx.tonicPc + 7) % 12;
        let tonicHits = 0, domHits = 0, bassCad = 0;
        for (const n of tail) {
          const pc = (n.midi % 12 + 12) % 12;
          if (pc === tonic) tonicHits++;
          if (pc === dom) domHits++;
          if (n.voice === Math.max(...tail.map(x => x.voice)) && (pc === tonic || pc === dom)) bassCad++;
        }
        return tonicHits * 2 + domHits + bassCad * 2;
      }
      function harmonicCoherence(notes, plan, ctx) {
        let ok = 0, total = 0;
        for (const m of plan) {
          const chord = chordPcsForFunction(ctx, m.fn);
          const span = notes.filter(n => n.startBeat >= m.measure * 4 && n.startBeat < (m.measure + 1) * 4);
          for (const n of span) {
            total++;
            if (chord.includes((n.midi % 12 + 12) % 12)) ok++;
          }
        }
        return total ? ok / total : 0;
      }
      function subjectRecurrence(notes) {
        return notes.filter(n => ['subject', 'answer', 'stretto'].includes(n.role)).length;
      }
      function groupByVoice(notes) {
        const g = {};
        for (const n of notes) { (g[n.voice] ||= []).push(n); }
        Object.values(g).forEach(arr => arr.sort(byStart));
        return g;
      }
      function scoreFugue(notes, plan, ctx) {
        // These checks reflect Bachian discipline: independent motion, consonant framework, recurring subject, and firm cadence.
        const par = countParallels(notes);
        const leaps = melodicLeapPenalty(notes);
        const totalBeats = Math.max(...notes.map(n => n.startBeat + n.durBeat), 0);
        const cad = cadenceStrength(notes, totalBeats, ctx);
        const harm = harmonicCoherence(notes, plan, ctx);
        const subj = subjectRecurrence(notes);
        const score = 100
          - par.p5 * 8
          - par.p8 * 10
          - leaps * 1.2
          - par.overlaps * 5
          - par.unisons * 0.3
          + (par.totalMotion ? (par.contrary / par.totalMotion) * 18 : 0)
          + cad * 1.8
          + harm * 25
          + Math.min(subj, 70) * 0.35;
        return { score, par, leaps, cad, harm, subj };
      }

      // ============================================================
      // repair / scoring pass
      // ============================================================
      function noteAt(arr, t) { return arr.find(n => n.startBeat <= t + 1e-9 && n.startBeat + n.durBeat > t + 1e-9); }
      function repairScore(notes, ctx, plan) {
        // Bach principle: repair tries to restore contrary motion, reduce bare parallels, and protect cadence.
        const byVoice = groupByVoice(notes);
        const voices = Object.keys(byVoice).map(Number).sort((a, b) => a - b);
        for (let pass = 0; pass < 3; pass++) {
          const grid = expandTimeline(notes, 0.5);
          for (let i = 1; i < grid.length; i++) {
            for (let a = 0; a < voices.length; a++) for (let b = a + 1; b < voices.length; b++) {
              const va = voices[a], vb = voices[b];
              const p0 = grid[i - 1].pitches[va], q0 = grid[i - 1].pitches[vb], p1 = grid[i].pitches[va], q1 = grid[i].pitches[vb];
              if ([p0, q0, p1, q1].some(v => v == null)) continue;
              const ip = intervalClass(p0, q0), ic = intervalClass(p1, q1);
              const ma = Math.sign(p1 - p0), mb = Math.sign(q1 - q0);
              if ((ip === 7 || ip === 0) && ic === ip && ma === mb && ma !== 0) {
                const targetVoice = vb;
                const note = noteAt(byVoice[targetVoice], grid[i].t);
                if (note) {
                  const nudges = [-2, 2, -1, 1, 3, -3];
                  for (const d of nudges) {
                    const cand = fitToScale(ctx, note.midi + d);
                    const old = note.midi; note.midi = cand;
                    const scNew = scoreFugue(notes, plan, ctx).score;
                    note.midi = old;
                    const scOld = scoreFugue(notes, plan, ctx).score;
                    if (scNew > scOld) { note.midi = cand; break; }
                  }
                }
              }
            }
          }
          // smooth large leaps
          for (const v of voices) {

      function setGeneratingState(isGenerating) {
        genBtn.classList.toggle('is-loading', isGenerating);
        genBtn.disabled = isGenerating;
        newSeedBtn.disabled = isGenerating;
        genBtn.textContent = isGenerating ? 'Generating' : 'Generate';
      }
      async function doGenerate() {
        if (generationTask) return generationTask;
        const cfg = currentConfig();
        generationTask = (async () => {
          setGeneratingState(true);
          await new Promise(resolve => requestAnimationFrame(resolve));
          const piece = generateFugue(cfg);
          currentPiece = piece;
          seedBox.textContent = 'Seed: ' + cfg.seed;
          describePiece(piece, cfg);
          renderRoll(piece);
          return piece;
        })();
        try {
          return await generationTask;
        } finally {
          setGeneratingState(false);
          generationTask = null;
        }
      }

      genBtn.onclick = () => { void doGenerate(); };
      newSeedBtn.onclick = () => { seed = Math.floor(Math.random() * 1e9); void doGenerate(); };
      document.getElementById('startBtn').onclick = async () => {
        if (!currentPiece) await doGenerate();
        await ensureAudio();
        schedulePlayback(currentPiece, currentConfig().tempo);
      };
      document.getElementById('stopBtn').onclick = () => stopPlayback();
      document.getElementById('midiBtn').onclick = async () => { if (!currentPiece) await doGenerate(); exportMIDI(currentPiece, currentConfig().tempo); };
      document.getElementById('wavBtn').onclick = async () => { if (!currentPiece) await doGenerate(); await ensureAudio(); await exportWAV(currentPiece, currentConfig().tempo); };
      ['change', 'input'].forEach(ev => {
        [keySel, lengthSel, voicesSel, charSel, complexitySel, tempoSel].forEach(el => el.addEventListener(ev, () => { void doGenerate(); }));
      });

      animationLoop();
      void doGenerate();
    })();
  </script>
</body>

</html>
